<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body{
background:linear-gradient(180deg,#ffe6ea,#ffd1dc);
font-family:Arial;
margin:0;
padding:0;
}

/* FLOATING HEART BACKGROUND */
.heart-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.heart{
position:absolute;
font-size:60px;
color:rgba(255,0,100,0.4);
animation:floatHeart linear infinite;
}

@keyframes floatHeart{
0%{
transform:translateY(110vh) scale(0.6);
opacity:0;
}
30%{opacity:1;}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

/* CENTER PAGE */
#pageCenter{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
z-index:2;
}

/* LAYOUT */
#layout{
display:flex;
justify-content:center;
align-items:center;
gap:50px;
}

/* SIDE PHOTOS */
.sidePhoto{
width:260px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

/* LETTER */
#letter{
width:420px;
background:#fff5f8;
padding:30px;
border-radius:22px;
color:#ff3366;
font-size:20px;
line-height:1.6;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

#letter h2{
margin-top:0;
}

/* DECOR */
.letter-deco{
font-size:26px;
color:#ff99aa;
margin:10px 0 20px;
}

/* TYPED TEXT */
#typedLetter p{
margin:6px 0;
font-size:20px;
}

/* SIGNATURE */
.signature{
margin-top:25px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- HEART BACKGROUND -->
<div class="heart-bg"></div>

<!-- CENTER CONTENT -->
<div id="pageCenter">
  <div id="layout">

    <!-- LEFT PHOTO -->
    <img src="photo5.png" class="sidePhoto">

    <!-- LETTER -->
    <div id="letter">

      <div class="letter-deco">❀ ❀ ❀</div>

      <h2>My Love ❤️</h2>

      <div id="typedLetter"></div>

      <div class="signature">Forever Yours 💍</div>

      <div class="letter-deco">❀ ❀ ❀</div>

    </div>

    <!-- RIGHT PHOTO -->
    <img src="photo2.png" class="sidePhoto">

  </div>
</div>

<script>
/* FLOATING HEARTS */
const heartBg=document.querySelector(".heart-bg");

for(let i=0;i<30;i++){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=6+Math.random()*6+"s";
h.style.animationDelay=Math.random()*5+"s";
heartBg.appendChild(h);
}

/* TYPE LETTER */
const lines=[
"To my dearest husband,",
"Happy Valentine's Day!",
"",
"Thank you for loving me the way you do.",
"Thank you for supporting my dreams.",
"Thank you for standing by my side through everything.",
"",
"Forever and always your wife."
];

let index=0;
const container=document.getElementById("typedLetter");

function printLine(){
if(index<lines.length){
const p=document.createElement("p");
p.innerText=lines[index];
container.appendChild(p);
index++;
setTimeout(printLine,800);
}
}

printLine();
</script>

</body>
</html>
